services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: anomaly-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anomaly-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      LOG_LEVEL: ${LOG_LEVEL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MODEL_REGISTRY_PATH: ${MODEL_REGISTRY_PATH}
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: anomaly-simulator
    restart: unless-stopped
    environment:
      SIMULATOR_API_URL: ${SIMULATOR_API_URL}
      SIMULATOR_RATE_PER_SEC: ${SIMULATOR_RATE_PER_SEC}
      SIMULATOR_DATA_PATH: ${SIMULATOR_DATA_PATH}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - ./data:/app/data
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: anomaly-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      api:
        condition: service_healthy

volumes:
  timescaledb_data:
